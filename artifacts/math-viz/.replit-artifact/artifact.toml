kind = "web"
previewPath = "/"
title = "Interactive Math Visualizer"
version = "1.0.0"
id = "artifacts/math-viz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22402

[services.development]
run = "pnpm --filter @workspace/math-viz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/math-viz", "run", "build" ]
publicDir = "artifacts/math-viz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22402"
BASE_PATH = "/"
